experiment:
  name: "xgboost_upstream"
  description: "XGBoost AR + targeted upstream pressure features"

model:
  type: "xgboost"
  phase: "ar_upstream"

hyperparameters:
  train_window: 90
  n_estimators: 200
  max_depth: 5
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.6
  reg_alpha: 0.1
  reg_lambda: 2.0

evaluation:
  method: "cv"
  cv_folds: 3

seed: 42
