evaluation:
  cv_folds: 3
  method: cv
experiment:
  description: XGBoost AR + domain PCA compressed features
  name: xgboost_domain_pca
hyperparameters:
  colsample_bytree: 0.7
  learning_rate: 0.05
  max_depth: 5
  n_estimators: 200
  reg_alpha: 0.1
  reg_lambda: 1.5
  subsample: 0.8
  train_window: 90
model:
  phase: ar_domain_pca
  type: xgboost
seed: 42
