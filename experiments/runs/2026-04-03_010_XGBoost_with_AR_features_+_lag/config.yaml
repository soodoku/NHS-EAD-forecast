evaluation:
  cv_folds: 3
  method: cv
experiment:
  description: XGBoost with AR features + lagged exogenous ED metrics
  name: xgboost_exog_lags
hyperparameters:
  colsample_bytree: 0.8
  learning_rate: 0.05
  max_depth: 5
  n_estimators: 200
  reg_alpha: 0.0
  reg_lambda: 1.0
  subsample: 0.8
  train_window: 90
model:
  phase: ar_exog_lags
  type: xgboost
seed: 42
