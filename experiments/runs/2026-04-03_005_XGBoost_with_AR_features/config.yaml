evaluation:
  cv_folds: 3
  method: cv
experiment:
  description: XGBoost with AR features
  name: xgboost_ar
hyperparameters:
  colsample_bytree: 0.8
  learning_rate: 0.1
  max_depth: 3
  n_estimators: 100
  reg_alpha: 0.0
  reg_lambda: 1.0
  subsample: 0.8
  train_window: 90
model:
  phase: ar
  type: xgboost
seed: 42
