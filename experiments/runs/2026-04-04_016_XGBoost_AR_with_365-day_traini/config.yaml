evaluation:
  cv_folds: 3
  method: cv
experiment:
  description: XGBoost AR with 365-day training window
  name: xgboost_window_365
hyperparameters:
  colsample_bytree: 0.6
  learning_rate: 0.05
  max_depth: 5
  n_estimators: 200
  reg_alpha: 0.1
  reg_lambda: 2.0
  subsample: 0.8
  train_window: 365
model:
  phase: ar
  type: xgboost
seed: 42
